<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Login Form</title>
    <meta name="description" content="Enterprise-grade login form with SSO buttons (Azure AD / Okta) and business-email validation.">
    <meta name="author" content="Aigars Silkalns / Colorlib">
    <link rel="canonical" href="https://puikinsh.github.io/login-forms/forms/corporate/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>L</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Corporate Login Form">
    <meta property="og:description" content="Enterprise-grade login form with SSO buttons (Azure AD / Okta) and business-email validation.">
    <meta property="og:url" content="https://puikinsh.github.io/login-forms/forms/corporate/">
    <meta property="og:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/corporate.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Corporate Login Form">
    <meta name="twitter:description" content="Enterprise-grade login form with SSO buttons (Azure AD / Okta) and business-email validation.">
    <meta name="twitter:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/corporate.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="company-logo">
                    <div class="logo-icon">🏢</div>
                </div>
                <h2>Welcome Back</h2>
                <p>Please sign in to your corporate account</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Business Email</label>
                        <span class="input-border"></span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                        <span class="input-border"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <div class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" class="checkbox-label">
                            <span class="checkbox-custom"></span>
                            Keep me signed in
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Reset password</a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="divider">
                <span>or sign in with</span>
            </div>

            <div class="sso-options">
                <button type="button" class="sso-btn azure-btn">
                    <span class="sso-icon azure-icon"></span>
                    <span>Microsoft Azure AD</span>
                </button>
                <button type="button" class="sso-btn okta-btn">
                    <span class="sso-icon okta-icon"></span>
                    <span>Okta</span>
                </button>
            </div>

            <div class="footer-links">
                <a href="#" class="footer-link">Privacy Policy</a>
                <span class="separator">•</span>
                <a href="#" class="footer-link">Terms of Service</a>
                <span class="separator">•</span>
                <a href="#" class="footer-link">Support</a>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Authentication Successful</h3>
                <p>Redirecting to your workspace...</p>
            </div>
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
